        <script src="/js/script.js" crossorigin="anonymous"></script>
        <script>
          const lines = [
            { el: "typing-text", text: "Hi, I'm Peter Hall.", delay: 0 },
            { el: "typing-handle", text: "@PeterHallAU", delay: 150 },
            { el: "typing-subtitle", text: "Site Reliability Engineer. Cloud Infrastructure Enthusiast. DevOps Advocate.", delay: 150 }
          ];

          let lineIndex = 0;
          let charIndex = 0;

          function typeLine() {
            if (lineIndex >= lines.length) return;

            const current = lines[lineIndex];
            const element = document.getElementById(current.el);

            element.classList.add("typing-cursor");
            element.style.opacity = "1";
            element.style.transform = "translateY(0)";

            if (charIndex < current.text.length) {
              element.textContent = current.text.substring(0, charIndex + 1);
              charIndex++;
              setTimeout(typeLine, 40);
            } else {
              element.classList.remove("typing-cursor");

              // If this was the last line, fade in social icons
              if (lineIndex === lines.length - 1) {
                const icons = document.querySelector(".social-icons");
                setTimeout(() => {
                  icons.style.opacity = "1";
                }, 300);
                return;
              }

              lineIndex++;
              charIndex = 0;
              setTimeout(typeLine, lines[lineIndex].delay || 300);
            }
          }

          document.addEventListener("DOMContentLoaded", typeLine);
        </script>
